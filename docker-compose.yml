version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gamole-postgres
    env_file: .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: gamole-api
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:gamole_dev@postgres:5432/gamole
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: gamole-web
    env_file: .env
    environment:
      - PORT=3000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
